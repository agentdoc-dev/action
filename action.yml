name: AgentDoc PR Report
description: >-
  Validates AgentDoc Knowledge Objects in Strict Mode and posts a sticky
  PR report with diagnostics and proposed knowledge.
author: Alex Bako
branding:
  icon: book-open
  color: purple

inputs:
  enforcement:
    description: >-
      `advisory` posts the Review Report without failing the job; `strict`
      additionally fails the job when `adoc check` finds errors.
    default: advisory
  scope:
    description: >-
      `full` gates on every error in the knowledge base; `diff` gates only on
      errors in files changed by the pull request (the full report is always
      posted).
    default: full
  report-style:
    description: >-
      Markdown layout for the validation section of the report: `compact`
      (one bullet per diagnostic, remediation help collapsed), `table` (one
      row per diagnostic), or `detailed` (per-file grouping with
      object_id/help sub-bullets).
    default: compact
  adoc-version:
    description: >-
      adoc release tag to install. The default is the version this action
      release was tested against; `latest` is accepted but not recommended
      for pinning.
    default: v0.1.1
  working-directory:
    description: Directory from which `agentdoc.config.yaml` discovery starts.
    default: "."
  comment:
    description: >-
      Set `false` to skip the sticky pull request comment (annotations and
      the job summary are still produced). Use this when several jobs in one
      workflow run the action, so only one of them comments.
    default: "true"
  github-token:
    description: >-
      Token used to download the adoc release and upsert the sticky pull
      request comment.
    default: ${{ github.token }}
  propose:
    description: >-
      Draft Knowledge Objects for uncovered changed paths with an LLM. On by
      default; skips with a notice when no credentials are configured (fork
      PRs have no secrets). Set `false` to disable.
    default: "true"
  propose-provider:
    description: >-
      Proposal engine. Only `claude-code` is implemented; other values fail
      the job.
    default: claude-code
  propose-delivery:
    description: >-
      How validated drafts are delivered. `comment` renders them in the
      sticky PR report; `commit` additionally pushes them to the PR branch
      (same-repo PRs with `contents: write` only — degrades to comment
      otherwise).
    default: comment
  propose-on-error:
    description: >-
      `warn` keeps the job green when proposal generation fails and falls
      back to the mechanical uncovered-path list; `fail` fails the job (after
      the comment posts).
    default: warn
  propose-max-paths:
    description: >-
      Cap per proposal scope (uncovered paths, stale KOs, expired KOs) sent
      to the LLM per run; the remainder is listed mechanically.
    default: "10"
  model:
    description: Model the proposal provider uses.
    default: claude-sonnet-5
  claude-code-version:
    description: >-
      `@anthropic-ai/claude-code` npm version installed when proposing. The
      default is the version this action release was tested against.
    default: "2.1.215"
  claude-code-oauth-token:
    description: >-
      Claude subscription token from `claude setup-token`, stored as a repo
      secret. Alternative to anthropic-api-key.
    default: ""
  anthropic-api-key:
    description: >-
      Anthropic API key for proposals. Takes precedence over
      claude-code-oauth-token when both are set.
    default: ""

runs:
  using: composite
  steps:
    - name: Install adoc
      shell: bash
      env:
        ADOC_VERSION: ${{ inputs.adoc-version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: '"${GITHUB_ACTION_PATH}/scripts/install.sh"'

    - name: Build Graph Artifact
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      # Build exits 1 when the corpus has errors; the gate belongs to check,
      # and a missing artifact degrades the Impacted Query gracefully.
      run: adoc build --no-embeddings || true

    - name: Register problem matcher
      shell: bash
      run: echo "::add-matcher::${GITHUB_ACTION_PATH}/problem-matcher.json"

    - name: Run Strict Mode validation and Impacted Query
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ENFORCEMENT: ${{ inputs.enforcement }}
        SCOPE: ${{ inputs.scope }}
        REPORT_STYLE: ${{ inputs.report-style }}
        ADOC_VERSION: ${{ inputs.adoc-version }}
      run: '"${GITHUB_ACTION_PATH}/scripts/report.sh"'

    # pull_request only: pull_request_target runs untrusted PR content with
    # secrets in scope — exactly the blast radius proposals must avoid.
    - name: Propose Knowledge Objects
      if: github.event_name == 'pull_request' && inputs.propose == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PROPOSE_PROVIDER: ${{ inputs.propose-provider }}
        PROPOSE_ON_ERROR: ${{ inputs.propose-on-error }}
        PROPOSE_MAX_PATHS: ${{ inputs.propose-max-paths }}
        MODEL: ${{ inputs.model }}
        CLAUDE_CODE_VERSION: ${{ inputs.claude-code-version }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
      run: '"${GITHUB_ACTION_PATH}/scripts/propose.sh"'

    - name: Compose report
      shell: bash
      env:
        ENFORCEMENT: ${{ inputs.enforcement }}
        SCOPE: ${{ inputs.scope }}
        ADOC_VERSION: ${{ inputs.adoc-version }}
      run: '"${GITHUB_ACTION_PATH}/scripts/compose.sh"'

    - name: Upsert pull request comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: '"${GITHUB_ACTION_PATH}/scripts/comment.sh"'

    # After the comment: delivery switches the checkout to the PR branch
    # tip, so nothing composing the report may run afterwards.
    - name: Deliver drafts
      if: github.event_name == 'pull_request' && inputs.propose == 'true' && inputs.propose-delivery != 'comment'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PROPOSE_DELIVERY: ${{ inputs.propose-delivery }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_REF: ${{ github.head_ref }}
      run: '"${GITHUB_ACTION_PATH}/scripts/deliver.sh"'

    - name: Enforce
      shell: bash
      env:
        ENFORCEMENT: ${{ inputs.enforcement }}
        PROPOSE_ON_ERROR: ${{ inputs.propose-on-error }}
      run: |
        gate_code="$(cat "$RUNNER_TEMP/adoc-gate-code")"
        if [ "$gate_code" -ge 2 ]; then
          echo "::error::adoc could not validate the project (exit $gate_code) — see the job log; this fails even in advisory mode"
          exit "$gate_code"
        fi
        if [ "$ENFORCEMENT" = "strict" ] && [ "$gate_code" != "0" ]; then
          echo "::error::adoc check found errors and enforcement is strict"
          exit "$gate_code"
        fi
        propose_code="$(cat "$RUNNER_TEMP/adoc-propose-code" 2>/dev/null || echo 0)"
        if [ "$PROPOSE_ON_ERROR" = "fail" ] && [ "$propose_code" != "0" ]; then
          echo "::error::proposal generation failed and propose-on-error is fail"
          exit 1
        fi
