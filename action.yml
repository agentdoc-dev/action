name: AgentDoc PR Report
description: >-
  Assesses exact PR revisions against AgentDoc knowledge and posts a sticky
  report with a machine-readable receipt.
author: Alex Bako
branding:
  icon: book-open
  color: purple

outputs:
  assessment-outcome:
    description: Deterministic Change Assessment outcome.
    value: ${{ steps.finalize.outputs.assessment-outcome }}
  assessment-completeness:
    description: Change Assessment completeness.
    value: ${{ steps.finalize.outputs.assessment-completeness }}
  assessment-invocation-id:
    description: Collision-resistant identity for this Action invocation.
    value: ${{ steps.finalize.outputs.assessment-invocation-id }}
  assessment-path:
    description: Absolute path to the exact validated assessment JSON.
    value: ${{ steps.finalize.outputs.assessment-path }}
  assessment-sha256:
    description: SHA-256 of the exact assessment bytes.
    value: ${{ steps.finalize.outputs.assessment-sha256 }}
  assessment-receipt-path:
    description: Absolute path to the Action-owned PR assessment receipt.
    value: ${{ steps.finalize.outputs.assessment-receipt-path }}
  assessment-receipt-sha256:
    description: SHA-256 of the PR assessment receipt.
    value: ${{ steps.finalize.outputs.assessment-receipt-sha256 }}
  semantic-review-path:
    description: Absolute path to the complete cited semantic review artifact.
    value: ${{ steps.finalize.outputs.semantic-review-path }}
  semantic-review-sha256:
    description: SHA-256 of the complete cited semantic review artifact.
    value: ${{ steps.finalize.outputs.semantic-review-sha256 }}

inputs:
  enforcement:
    description: >-
      `advisory` reports structural invalidity without failing; `strict`
      fails when the selected structural scope contains errors.
    default: advisory
  scope:
    description: >-
      `full` gates on every error in the knowledge base; `diff` gates only on
      errors in files changed by the pull request (the full report is always
      posted).
    default: full
  report-style:
    description: >-
      Advisory disposition layout: `compact` bullets, `table` rows, or
      `detailed` records with source and content hashes.
    default: compact
  adoc-version:
    description: >-
      adoc release tag to install. The default is the version this action
      release was tested against; `latest` is accepted but not recommended
      for pinning.
    default: v0.3.3
  working-directory:
    description: Directory from which `agentdoc.config.yaml` discovery starts.
    default: "."
  comment:
    description: >-
      Set `false` to skip the sticky pull request comment (annotations and
      the job summary are still produced). Use this when several jobs in one
      workflow run the action, so only one of them comments.
    default: "true"
  github-token:
    description: >-
      Token used to download the adoc release and upsert the sticky pull
      request comment.
    default: ${{ github.token }}
  semantic-review:
    description: >-
      Experimental model-assisted cited review of bounded PR diff and selected
      AgentDoc knowledge. Advisory only and may send repository data to the
      configured provider.
    default: "false"
  propose:
    description: >-
      Build canonical create-only AgentDoc patches for uncovered changed
      paths. On by default; skips when credentials are unavailable or unsafe.
    default: "true"
  propose-provider:
    description: >-
      Proposal engine. Only `claude-code` is implemented; other values fail
      the job.
    default: claude-code
  propose-delivery:
    description: >-
      Delivery mode. V9.3.2 renders canonical patches with `comment`;
      governed `commit` and `pr` activation follows in V9.3.3.
    default: comment
  propose-on-error:
    description: >-
      `warn` keeps the job green when semantic review or proposal generation
      fails; `fail` fails the job after the report and receipt are finalized.
    default: warn
  propose-max-paths:
    description: >-
      Maximum selected changed paths sent to the model in one bounded call.
    default: "10"
  model:
    description: Model used for cited review and canonical patch candidates.
    default: claude-sonnet-5
  claude-code-version:
    description: >-
      Claude Code native package version installed when proposing. Only the
      bundled version with its pinned SHA-512 integrity is accepted.
    default: "2.1.215"
  claude-code-oauth-token:
    description: >-
      Claude subscription token from `claude setup-token`, stored as a repo
      secret. Alternative to anthropic-api-key.
    default: ""
  anthropic-api-key:
    description: >-
      Anthropic API key for proposals. Takes precedence over
      claude-code-oauth-token when both are set.
    default: ""

runs:
  using: composite
  steps:
    - name: Validate Action invocation
      shell: bash
      env:
        INPUT_ENFORCEMENT: ${{ inputs.enforcement }}
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_REPORT_STYLE: ${{ inputs.report-style }}
        INPUT_ADOC_VERSION: ${{ inputs.adoc-version }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_SEMANTIC_REVIEW: ${{ inputs.semantic-review }}
        INPUT_PROPOSE: ${{ inputs.propose }}
        INPUT_PROPOSE_PROVIDER: ${{ inputs.propose-provider }}
        INPUT_PROPOSE_DELIVERY: ${{ inputs.propose-delivery }}
        INPUT_PROPOSE_ON_ERROR: ${{ inputs.propose-on-error }}
        INPUT_PROPOSE_MAX_PATHS: ${{ inputs.propose-max-paths }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_CLAUDE_CODE_VERSION: ${{ inputs.claude-code-version }}
      run: '"${GITHUB_ACTION_PATH}/scripts/preflight.sh"'

    - name: Install adoc
      if: env.ADOC_PIPELINE_READY == 'true'
      shell: bash
      env:
        ADOC_VERSION: ${{ inputs.adoc-version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: '"${GITHUB_ACTION_PATH}/scripts/install.sh"'

    - name: Register problem matcher
      if: env.ADOC_PIPELINE_READY == 'true'
      shell: bash
      run: echo "::add-matcher::${GITHUB_ACTION_PATH}/problem-matcher.json"

    - name: Run exact-SHA Change Assessment
      if: env.ADOC_PIPELINE_READY == 'true'
      shell: bash
      working-directory: ${{ env.ADOC_WORKING_DIRECTORY }}
      run: '"${GITHUB_ACTION_PATH}/scripts/report.sh"'

    - name: Remove problem matcher
      if: always()
      shell: bash
      run: echo "::remove-matcher owner=adoc::"

    - name: Install model provider
      if: >-
        env.ADOC_ASSESSMENT_VALID == 'true' &&
        (inputs.semantic-review == 'true' || inputs.propose == 'true') &&
        env.ADOC_PROPOSE_ELIGIBLE == 'true' &&
        (inputs.anthropic-api-key != '' || inputs.claude-code-oauth-token != '')
      shell: bash
      run: |
        mkdir -p "$ADOC_RUN_DIR/provider-install-home"
        if ! env -i HOME="$ADOC_RUN_DIR/provider-install-home" PATH=/usr/bin:/bin LANG=C LC_ALL=C \
          "${GITHUB_ACTION_PATH}/scripts/install-provider.sh" \
          "${{ inputs.claude-code-version }}" "$ADOC_RUN_DIR/provider"; then
          echo '::warning::AgentDoc: model provider installation failed; optional-stage policy will decide the final gate'
        fi

    # pull_request only: pull_request_target runs untrusted PR content with
    # secrets in scope — exactly the blast radius proposals must avoid.
    - name: Run cited semantic review
      if: >-
        env.ADOC_ASSESSMENT_VALID == 'true' &&
        (inputs.semantic-review == 'true' || inputs.propose == 'true')
      shell: bash
      working-directory: ${{ env.ADOC_WORKING_DIRECTORY }}
      env:
        SEMANTIC_REVIEW: ${{ inputs.semantic-review }}
        PROPOSE: ${{ inputs.propose }}
        PROPOSE_ON_ERROR: ${{ inputs.propose-on-error }}
        PROPOSE_MAX_PATHS: ${{ inputs.propose-max-paths }}
        MODEL: ${{ inputs.model }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
      run: '"${GITHUB_ACTION_PATH}/scripts/semantic-review.sh"'

    - name: Propose Knowledge Objects
      if: env.ADOC_ASSESSMENT_VALID == 'true' && inputs.propose == 'true'
      shell: bash
      working-directory: ${{ env.ADOC_WORKING_DIRECTORY }}
      env:
        PROPOSE_ON_ERROR: ${{ inputs.propose-on-error }}
      run: '"${GITHUB_ACTION_PATH}/scripts/propose.sh"'

    - name: Deliver drafts
      if: env.ADOC_ASSESSMENT_VALID == 'true' && inputs.propose == 'true' && inputs.propose-delivery != 'comment'
      shell: bash
      working-directory: ${{ env.ADOC_WORKING_DIRECTORY }}
      env:
        PROPOSE_DELIVERY: ${{ inputs.propose-delivery }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_REF: ${{ github.head_ref }}
      run: '"${GITHUB_ACTION_PATH}/scripts/deliver.sh"'

    - name: Finalize assessment receipt
      id: finalize
      if: always()
      shell: bash
      env:
        ENFORCEMENT: ${{ inputs.enforcement }}
        SCOPE: ${{ inputs.scope }}
        SEMANTIC_REVIEW: ${{ inputs.semantic-review }}
        PROPOSE: ${{ inputs.propose }}
        PROPOSE_ON_ERROR: ${{ inputs.propose-on-error }}
        PROPOSE_DELIVERY: ${{ inputs.propose-delivery }}
        ADOC_ACTION_REF: ${{ github.action_ref }}
      run: '"${GITHUB_ACTION_PATH}/scripts/finalize.sh"'

    - name: Compose report
      if: always()
      shell: bash
      env:
        ENFORCEMENT: ${{ inputs.enforcement }}
        SCOPE: ${{ inputs.scope }}
        REPORT_STYLE: ${{ inputs.report-style }}
        ADOC_VERSION: ${{ inputs.adoc-version }}
        ADOC_ACTION_REF: ${{ github.action_ref }}
      run: '"${GITHUB_ACTION_PATH}/scripts/compose.sh"'

    - name: Finalize bounded report
      if: always()
      shell: bash
      run: '"${GITHUB_ACTION_PATH}/scripts/finalize-report.sh"'

    - name: Write job summary
      if: always()
      shell: bash
      run: cat "$ADOC_RUN_DIR/report.md" >> "$GITHUB_STEP_SUMMARY"

    - name: Upsert pull request comment
      if: always() && github.event_name == 'pull_request' && inputs.comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: '"${GITHUB_ACTION_PATH}/scripts/comment.sh"'

    - name: Enforce
      if: always()
      shell: bash
      run: '"${GITHUB_ACTION_PATH}/scripts/enforce.sh"'

    - name: Remove private proposal state
      if: always()
      shell: bash
      run: '"${GITHUB_ACTION_PATH}/scripts/cleanup.sh"'
