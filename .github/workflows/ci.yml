name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic:
    name: cited semantic review regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: test/semantic-review.sh

  security:
    name: proposal trust-boundary regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: test/security.sh

  fail-honest:
    name: fail-honest report regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: test/fail-honest.sh

  receipt:
    name: exact-SHA receipt regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: test/receipt.sh

  report:
    name: advisory disposition report regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: test/report.sh

  strict-clean:
    name: strict + clean fixture (${{ matrix.runner }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./
        id: adoc
        with:
          working-directory: test/fixture-clean
          enforcement: strict
          comment: false
      - name: Verify retained assessment outputs
        if: always()
        env:
          ASSESSMENT: ${{ steps.adoc.outputs.assessment-path }}
          ASSESSMENT_SHA: ${{ steps.adoc.outputs.assessment-sha256 }}
          RECEIPT: ${{ steps.adoc.outputs.assessment-receipt-path }}
          RECEIPT_SHA: ${{ steps.adoc.outputs.assessment-receipt-sha256 }}
        run: |
          test -f "$ASSESSMENT" && test -f "$RECEIPT"
          test "sha256:$(sha256sum "$ASSESSMENT" | awk '{print $1}')" = "$ASSESSMENT_SHA"
          test "sha256:$(sha256sum "$RECEIPT" | awk '{print $1}')" = "$RECEIPT_SHA"
          jq -e '.run_status == "completed"' "$RECEIPT"

  strict-broken:
    name: strict + broken fixture must fail (${{ matrix.runner }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./
        id: adoc
        continue-on-error: true
        with:
          working-directory: test/fixture-broken
          enforcement: strict
          comment: false
      - name: Assert strict enforcement failed the step
        if: steps.adoc.outcome != 'failure'
        run: |
          echo "::error::expected strict enforcement to fail on the broken fixture"
          exit 1
      - name: Verify invalid assessment still has a completed receipt
        if: always()
        env:
          ASSESSMENT: ${{ steps.adoc.outputs.assessment-path }}
          RECEIPT: ${{ steps.adoc.outputs.assessment-receipt-path }}
        run: |
          test -f "$ASSESSMENT" && test -f "$RECEIPT"
          jq -e '.completeness == "error" and .outcome == "invalid"' "$ASSESSMENT"
          jq -e '.run_status == "completed" and .assessment.outcome == "invalid"' "$RECEIPT"

  advisory-broken:
    name: advisory + broken fixture stays green (${{ matrix.runner }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # On pull requests the x86_64 leg also live-tests the sticky comment
      # upsert; the other jobs set comment: false so parallel legs don't race
      # to create duplicate marker comments.
      - uses: ./
        with:
          working-directory: test/fixture-broken
          enforcement: advisory
          comment: ${{ matrix.runner == 'ubuntu-latest' }}

  canonical-proposals:
    name: canonical proposal sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      ADOC_VERSION: v0.3.3
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install AgentDoc v0.3.3
        env:
          ADOC_RUN_DIR: ${{ runner.temp }}/adoc-install
          GITHUB_ENV: ${{ runner.temp }}/adoc-env
          GITHUB_PATH: ${{ runner.temp }}/adoc-path
        run: scripts/install.sh
      - name: Prove canonical create-only proposals
        env:
          ADOC_BIN: ${{ runner.temp }}/adoc-install/adoc-bin/adoc
        run: test/canonical-proposal.sh

  governed-delivery:
    name: human-governed delivery state machine
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      ADOC_VERSION: v0.3.3
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install AgentDoc v0.3.3
        env:
          ADOC_RUN_DIR: ${{ runner.temp }}/adoc-delivery-install
          GITHUB_ENV: ${{ runner.temp }}/adoc-delivery-env
          GITHUB_PATH: ${{ runner.temp }}/adoc-delivery-path
        run: scripts/install.sh
      - name: Prove commit, follow-up PR, freshness, and ownership behavior
        env:
          ADOC_BIN: ${{ runner.temp }}/adoc-delivery-install/adoc-bin/adoc
        run: test/delivery.sh

  provider-smoke:
    name: pinned provider smoke
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install AgentDoc v0.3.3
        env:
          ADOC_VERSION: v0.3.3
          GH_TOKEN: ${{ github.token }}
          ADOC_RUN_DIR: ${{ runner.temp }}/provider-smoke-install
          GITHUB_ENV: ${{ runner.temp }}/provider-smoke-env
          GITHUB_PATH: ${{ runner.temp }}/provider-smoke-path
        run: scripts/install.sh
      - name: Exercise one real combined provider call
        env:
          ADOC_BIN: ${{ runner.temp }}/provider-smoke-install/adoc-bin/adoc
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: test/provider-smoke.sh
